services:
  # database
  postgres:
    image: postgres:15-alpine
    container_name: ims-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-inventorydb}
      POSTGRES_USER: ${POSTGRES_USER:-ims}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ims_pw_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - ims-net

  # cache
  redis:
    image: redis:7-alpine
    container_name: ims-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    networks:
      - ims-net

  # run API
  api:
    build:
      context: .
      dockerfile: src/IMS.API/Dockerfile
    image: ims-api:latest
    container_name: ims-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: Host=${POSTGRES_HOST:-postgres};Port=5432;Database=${POSTGRES_DB:-inventorydb};Username=${POSTGRES_USER:-ims};Password=${POSTGRES_PASSWORD:-ims_pw_2024}
      JwtSettings__Secret: ${JWT_SECRET:-YourSuperSecretKeyForJwtAuthenticationThatNeedsToBeLongEnough}
      JwtSettings__Issuer: ${JWT_ISSUER:-IMS.API}
      JwtSettings__Audience: ${JWT_AUDIENCE:-IMS.Client}
      RedisConnection: ${REDIS_CONNECTION:-redis:6379}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "5000:8080"
    networks:
      - ims-net

networks:
  ims-net:
    name: ims-net
    driver: bridge

volumes:
  postgres_data:
    name: ims-postgres-data